name: docker-image-armv7

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  APP_NAME: CLIProxyAPI
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/cli-proxy-api-plus

jobs:
  docker_armv7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo VERSION=`git describe --tags --always --dirty` >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
          echo SUFFIX=`date -u +%Y%m%d-%H%M` >> $GITHUB_ENV
      - name: Build and push (armv7)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.armv7
          platforms: linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.GHCR_REPO }}:latest-armv7
            ${{ env.GHCR_REPO }}:${{ env.VERSION }}-${{ env.SUFFIX }}-armv7
      - name: Export image to tar
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            --file Dockerfile.armv7 \
            --build-arg VERSION=${{ env.VERSION }} \
            --build-arg COMMIT=${{ env.COMMIT }} \
            --build-arg BUILD_DATE=${{ env.BUILD_DATE }} \
            --output type=docker,dest=./ghcr-cli-proxy-api-plus-armv7-image.tar \
            .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: armv7-docker-${{ env.VERSION }}-${{ env.SUFFIX }}
          name: ARMv7 Docker ${{ env.VERSION }}-${{ env.SUFFIX }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          files: |
            ghcr-cli-proxy-api-plus-armv7-image.tar
